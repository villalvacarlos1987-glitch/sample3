const formLink = params.get("form");

let id = document.getElementById("id").value;

if(name=="" || id==""){

alert("Please enter Name and ID");

return;

}

/* SEND DATA TO TEACHER DASHBOARD */

channel.postMessage({

type:"join",
name:name,
id:id

});

/* OPEN QUIZ */

window.location.href = "file:///C:/Users/villa/OneDrive/Desktop/Q4%20-%20Comp8/teacher.html";

}
