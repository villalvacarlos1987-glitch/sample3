<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz Room Generator</title>

<style>

body{
font-family: Arial;
text-align:center;
padding:20px;
background:#f4f4f4;
}

form{
background:white;
padding:20px;
border-radius:10px;
width:400px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:95%;
padding:8px;
margin:8px 0;
}

button{
padding:10px 15px;
margin:10px;
border:none;
border-radius:5px;
cursor:pointer;
}

#generate{background:#28a745;color:white;}
#active{background:#007bff;color:white;}

#dashboard{
display:none;
margin-top:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.station{
background:white;
border-radius:8px;
padding:8px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
font-size:12px;
}

video{
width:100%;
height:100px;
background:black;
}

</style>
</head>

<body>

<h1>Teacher Quiz Room Setup</h1>

<form>

<input type="text" id="grade" placeholder="Grade Level">

<input type="text" id="section" placeholder="Section">

<input type="text" id="teacher" placeholder="Teacher Name">

<input type="text" id="formlink" placeholder="Google Form Link">

<input type="number" id="time" placeholder="Time in Minutes">

<input type="text" id="generatedURL" placeholder="Student Generated URL" readonly>

<button type="button" id="generate" onclick="generateLink()">Generate Link</button>

<button type="button" id="active" onclick="activateRoom()">Room Active</button>

</form>


<div id="dashboard">

<h2>Live Student Monitoring Dashboard</h2>

<p>
Start Time: <span id="startTime"></span> |
End Time: <span id="endTime"></span>
</p>

<div class="grid" id="stations"></div>

</div>


<script>

function generateLink(){

let grade=document.getElementById("grade").value;
let section=document.getElementById("section").value;
let teacher=document.getElementById("teacher").value;
let form=document.getElementById("formlink").value;
let time=document.getElementById("time").value;

let link="student.html?grade="+grade+
"&section="+section+
"&teacher="+teacher+
"&form="+encodeURIComponent(form)+
"&time="+time;

document.getElementById("generatedURL").value=link;

}


function activateRoom(){

document.getElementById("dashboard").style.display="block";

let now=new Date();

let start=now.toLocaleTimeString();

let end=new Date(now.getTime()+document.getElementById("time").value*60000).toLocaleTimeString();

document.getElementById("startTime").textContent=start;
document.getElementById("endTime").textContent=end;

createStations();

}


function createStations(){

let container=document.getElementById("stations");

container.innerHTML="";

for(let i=1;i<=40;i++){

let station=document.createElement("div");

station.className="station";

station.innerHTML=`

<b>Station ${i}</b>

<video autoplay muted></video>

<div>Name: Waiting...</div>

<div>ID: Waiting...</div>

<div>Tabs Open: 0</div>

<div>Gaze: Unknown</div>

`;

container.appendChild(station);

}

}

</script>

</body>
</html>
